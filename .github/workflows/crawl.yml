name: Robotaxi Crawler

on:
  schedule:
    # 매일 09:00 KST (UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write  # data/news.json 커밋을 위해 필수

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run news crawler
        run: python robotaxi_crawler.py

      - name: Run company page change detection
        run: python crawl_company_updates.py

      - name: Validate data
        run: python validate_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 변경 없으면 빈 커밋 방지
          if git diff --quiet data/; then
            echo "No changes in data/ — skipping commit"
            exit 0
          fi
          git add data/
          git commit -m "chore: auto-update robotaxi data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          # pull --rebase to handle concurrent pushes
          git pull --rebase origin main || true
          git push
