<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 로보택시 현황 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #4f8ef7;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    #last-updated { font-size: 0.75rem; color: var(--muted); }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-card .label { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; }
    .kpi-card .value { font-size: 2rem; font-weight: 700; }
    .kpi-card .sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    /* Two-column layout */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    /* Company Table */
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 10px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-green { background: rgba(52,211,153,.15); color: var(--green); }
    .badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }
    .badge-muted { background: rgba(148,163,184,.1); color: var(--muted); }

    /* Timeline */
    .timeline { list-style: none; }
    .timeline li {
      display: flex;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
    }
    .timeline li:last-child { border-bottom: none; }
    .tl-date { min-width: 86px; color: var(--muted); font-size: 0.75rem; padding-top: 2px; }
    .tl-title { font-weight: 500; }
    .tl-desc { color: var(--muted); font-size: 0.76rem; margin-top: 3px; }
    .future { opacity: 0.6; }
    .future .tl-date { color: var(--accent); }

    /* News Feed */
    .news-list { list-style: none; }
    .news-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .news-item:last-child { border-bottom: none; }
    .news-headline {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .news-headline a {
      color: var(--text);
      text-decoration: none;
    }
    .news-headline a:hover { color: var(--accent); }
    .news-summary { font-size: 0.77rem; color: var(--muted); margin-bottom: 6px; line-height: 1.5; }
    .news-meta { font-size: 0.7rem; color: var(--muted); display: flex; gap: 8px; align-items: center; }
    .news-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(79,142,247,.12);
      color: var(--accent);
      font-size: 0.68rem;
    }
    .no-news { color: var(--muted); font-size: 0.83rem; text-align: center; padding: 32px 0; }

    /* Chart container */
    .chart-wrap { position: relative; height: 200px; }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <h1>🚖 한국 로보택시 현황 대시보드</h1>
  <span id="last-updated">로딩 중...</span>
</header>

<!-- KPI Cards -->
<div class="kpi-grid">
  <div class="kpi-card">
    <div class="label">운행 중 사업자</div>
    <div class="value" id="kpi-operators">—</div>
    <div class="sub">시범운행 포함</div>
  </div>
  <div class="kpi-card">
    <div class="label">운행 구역</div>
    <div class="value" id="kpi-zones">—</div>
    <div class="sub">지정 구역 수</div>
  </div>
  <div class="kpi-card">
    <div class="label">뉴스 수집 건수</div>
    <div class="value" id="kpi-news">—</div>
    <div class="sub">AI 요약 포함</div>
  </div>
  <div class="kpi-card">
    <div class="label">최고 SAE 레벨</div>
    <div class="value">Lv.4</div>
    <div class="sub">운행 중 기준</div>
  </div>
</div>

<!-- Companies + Timeline -->
<div class="grid-2">

  <div class="card">
    <h2>사업자 현황</h2>
    <table>
      <thead>
        <tr>
          <th>회사</th>
          <th>상태</th>
          <th>구역</th>
          <th>Lv.</th>
        </tr>
      </thead>
      <tbody id="companies-tbody">
        <tr><td colspan="4" style="color:var(--muted);text-align:center;padding:20px">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <h2>규제·정책 타임라인</h2>
    <ul class="timeline" id="timeline-list">
      <li><span class="tl-date">로딩 중...</span></li>
    </ul>
  </div>

</div>

<!-- News Feed + Level Chart -->
<div class="grid-2">

  <div class="card" style="grid-column: 1 / -1;">
    <h2>최신 뉴스 (AI 요약)</h2>
    <ul class="news-list" id="news-list">
      <li class="no-news">뉴스 데이터 로딩 중...</li>
    </ul>
  </div>

</div>

<footer>
  데이터 수집: Google News RSS · 매일 09:00 KST 자동 업데이트 · GitHub Actions
</footer>

<script>
// ─── Helpers ─────────────────────────────────────────────────────────────────

function statusBadge(status) {
  if (status === "시범운행") return `<span class="badge badge-green">${status}</span>`;
  if (status === "준비 중") return `<span class="badge badge-yellow">${status}</span>`;
  return `<span class="badge badge-muted">${status}</span>`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
}

function relTime(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return "오늘";
  if (days === 1) return "1일 전";
  if (days < 30) return `${days}일 전`;
  return formatDate(dateStr);
}

// ─── Load Data ────────────────────────────────────────────────────────────────

async function fetchJSON(path) {
  const resp = await fetch(path);
  if (!resp.ok) throw new Error(`Failed to load ${path}: ${resp.status}`);
  return resp.json();
}

async function loadAll() {
  try {
    const [companies, zones, timeline, news] = await Promise.all([
      fetchJSON("../data/companies.json"),
      fetchJSON("../data/zones.json"),
      fetchJSON("../data/timeline.json"),
      fetchJSON("../data/news.json").catch(() => []),
    ]);

    renderKPIs(companies, zones, news);
    renderCompanies(companies);
    renderTimeline(timeline);
    renderNews(news);
    document.getElementById("last-updated").textContent =
      `갱신: ${new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" })}`;
  } catch (err) {
    console.error("데이터 로드 오류:", err);
    document.getElementById("last-updated").textContent = "데이터 로드 실패";
  }
}

// ─── Render Functions ─────────────────────────────────────────────────────────

function renderKPIs(companies, zones, news) {
  const activeOps = companies.filter(c => c.status === "시범운행").length;
  const activeZones = zones.filter(z => z.status === "운행 중").length;

  document.getElementById("kpi-operators").textContent = activeOps;
  document.getElementById("kpi-zones").textContent = zones.length;
  document.getElementById("kpi-news").textContent = news.length;
}

function renderCompanies(companies) {
  const tbody = document.getElementById("companies-tbody");
  tbody.innerHTML = companies.map(c => `
    <tr>
      <td>
        <div style="font-weight:600">${c.name}</div>
        <div style="font-size:0.72rem;color:var(--muted)">${c.partner || ""}</div>
      </td>
      <td>${statusBadge(c.status)}</td>
      <td style="font-size:0.78rem">${(c.zones || []).join(", ") || "—"}</td>
      <td style="text-align:center;font-weight:600;color:var(--accent)">L${c.level || "?"}</td>
    </tr>
  `).join("");
}

function renderTimeline(events) {
  const list = document.getElementById("timeline-list");
  list.innerHTML = events
    .sort((a, b) => a.date.localeCompare(b.date))
    .map(e => `
      <li class="${e.is_future ? "future" : ""}">
        <span class="tl-date">${formatDate(e.date)}${e.is_future ? " (예정)" : ""}</span>
        <div>
          <div class="tl-title">${e.title}</div>
          <div class="tl-desc">${e.description}</div>
        </div>
      </li>
    `).join("");
}

function renderNews(news) {
  const list = document.getElementById("news-list");
  if (!news || news.length === 0) {
    list.innerHTML = `<li class="no-news">아직 수집된 뉴스가 없습니다.<br>GitHub Actions 크롤러가 실행되면 자동으로 표시됩니다.</li>`;
    return;
  }
  const recent = news.slice(0, 10);
  list.innerHTML = recent.map(item => `
    <li class="news-item">
      <div class="news-headline">
        <a href="${item.url || "#"}" target="_blank" rel="noopener">${item.headline}</a>
      </div>
      ${item.summary ? `<div class="news-summary">${item.summary}</div>` : ""}
      <div class="news-meta">
        <span>${item.source || ""}</span>
        <span>${item.published_at ? relTime(item.published_at) : ""}</span>
        ${(item.tags || []).map(t => `<span class="news-tag">${t}</span>`).join("")}
      </div>
    </li>
  `).join("");
}

// ─── Init ─────────────────────────────────────────────────────────────────────

loadAll();
</script>
</body>
</html>
