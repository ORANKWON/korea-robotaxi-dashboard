name: Robotaxi Crawler

on:
  schedule:
    # 매 6시간 (00:00, 06:00, 12:00, 18:00 UTC = 09:00, 15:00, 21:00, 03:00 KST)
    - cron: "0 */6 * * *"
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write  # data/news.json 커밋을 위해 필수

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        # googlenewsdecoder is required for unwrap_redirect_url to work.
        # Without it, the crawler still runs (ImportError is caught) but
        # all news items lack `final_url` and meta-description fallback
        # is disabled. See requirements.txt for why this matters.
        run: pip install -r requirements.txt

      - name: Run news crawler
        run: python robotaxi_crawler.py

      - name: Run company page change detection
        run: python crawl_company_updates.py

      - name: Validate data
        run: python validate_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 변경 없으면 빈 커밋 방지
          if git diff --quiet data/; then
            echo "No changes in data/ — skipping commit"
            exit 0
          fi
          git add data/
          git commit -m "chore: auto-update robotaxi data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          # pull --rebase to handle concurrent pushes
          git pull --rebase origin main || true
          git push

      - name: Revalidate Vercel ISR cache
        # On-demand cache bust so readers see fresh news within seconds
        # instead of waiting for the next 6h ISR window. Locked-in by
        # /plan-eng-review delta #3 (news-list-v2 plan).
        # continue-on-error: caching is a UX optimization, not correctness —
        # if the webhook is down, ISR will catch up within 6h.
        if: success()
        continue-on-error: true
        env:
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -z "$REVALIDATE_URL" ] || [ -z "$REVALIDATE_SECRET" ]; then
            echo "REVALIDATE_URL/REVALIDATE_SECRET not set — skipping cache bust"
            exit 0
          fi
          # Never echo $REVALIDATE_SECRET. -sS suppresses progress, shows errors.
          # --fail-with-body returns non-zero on 4xx/5xx but still prints body.
          http_code=$(curl -sS -o /tmp/reval.out -w "%{http_code}" \
            -X POST "$REVALIDATE_URL" \
            -H "x-revalidate-secret: $REVALIDATE_SECRET" \
            -H "content-type: application/json" \
            -d '{}' || echo "000")
          echo "Revalidate response: HTTP $http_code"
          cat /tmp/reval.out || true
          # Treat 200 and 207 (multi-status) as success
          case "$http_code" in 200|207) exit 0 ;; *) exit 1 ;; esac
